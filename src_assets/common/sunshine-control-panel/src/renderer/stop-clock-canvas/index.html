<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>串流屏摄专用钟钟钟钟钟（作者：串流群友）</title>
  <style>
    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0;
      height: 100vh;
      background: radial-gradient(circle at center, #1a2a3a 0%, #000000 100%);
      color: #fff;
      overflow: hidden;
    }

    .bg {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
      opacity: 0.3;
      pointer-events: none;
    }

    .btns {
      position: absolute;
      z-index: 2;
      bottom: 10px;
      right: 10px;
    }

    .btns button {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 0;
      margin: 0;
      width: 30px;
      height: 30px;
      font-size: 20px;
      text-align: center;
    }

    canvas {
      position: absolute;
      z-index: 1;
      opacity: 0.7;
      box-shadow: #00ffff 0 0 50px 10px;
    }
  </style>

</head>

<body>
  <!-- 移除外部图片依赖，提高加载速度 -->
  <!-- <img class="bg" src="https://t.alcy.cc/pc/"> -->
  <canvas id="canvas" width="500" height="500"></canvas>
  <div class="btns">
    <button id="btn-inc">+</button>
    <button id="btn-dec">-</button>
  </div>
  <script>
    const btnInc = document.querySelector('#btn-inc')
    const btnDec = document.querySelector('#btn-dec')
    const canvasElem = document.querySelector('#canvas')
    let curScale = 1

    btnInc.onclick = () => {
      if (curScale >= 3) return
      curScale = parseFloat((curScale + 0.2).toFixed(1))
      canvasElem.style.transform = `scale(${curScale})`
    }
    btnDec.onclick = () => {
      if (curScale <= 0.2) return
      curScale = parseFloat((curScale - 0.2).toFixed(1))
      canvasElem.style.transform = `scale(${curScale})`
    }

    /*
     * @Author: 欧阳骋宇
     * @Description: Optimized rendering
     */
    var canvas = document.getElementById("canvas");
    var ctx = canvas.getContext("2d");

    ctx.strokeStyle = '#00ffff';
    ctx.lineWidth = 17;
    ctx.shadowBlur = 15;
    ctx.shadowColor = '#00ffff'

    function degToRad(degree) {
      var factor = Math.PI / 180;
      return degree * factor;
    }

    function renderTime() {
      var now = new Date();
      var today = now.toDateString();
      // 使用性能更好的时间格式化
      var hours = String(now.getHours()).padStart(2, '0');
      var minutes = String(now.getMinutes()).padStart(2, '0');
      var seconds = String(now.getSeconds()).padStart(2, '0');
      var mil = now.getMilliseconds();
      var timeString = `${hours}:${minutes}:${seconds}`;

      var hrs = now.getHours();
      var min = now.getMinutes();
      var sec = now.getSeconds();
      var smoothsec = sec + (mil / 1000);
      var smoothmin = min + (smoothsec / 60);

      //Clear canvas
      ctx.clearRect(0, 0, 500, 500);

      //Background
      var gradient = ctx.createRadialGradient(250, 250, 5, 250, 250, 300);
      gradient.addColorStop(0, "#03303a");
      gradient.addColorStop(1, "black");
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, 500, 500);

      //Hours
      ctx.beginPath();
      ctx.arc(250, 250, 200, degToRad(270), degToRad((hrs * 30) - 90));
      ctx.stroke();

      //Minutes
      ctx.beginPath();
      ctx.arc(250, 250, 170, degToRad(270), degToRad((smoothmin * 6) - 90));
      ctx.stroke();

      //Seconds
      ctx.beginPath();
      ctx.arc(250, 250, 140, degToRad(270), degToRad((smoothsec * 6) - 90));
      ctx.stroke();

      // Date
      ctx.beginPath();
      ctx.font = "25px Helvetica";
      ctx.fillStyle = 'rgba(00, 255, 255, 1)'
      ctx.fillText(today, 175, 250);

      //Time
      ctx.font = "25px Helvetica Bold";
      ctx.fillStyle = 'rgba(00, 255, 255, 1)';
      ctx.fillText(timeString + ":" + String(mil).padStart(3, "0"), 175, 280);

      requestAnimationFrame(renderTime);
    }

    // Start animation loop
    requestAnimationFrame(renderTime);
  </script>

</body>

</html>
